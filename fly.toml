# Configuration Fly.io pour l'app Symfony (shop).
# Renommez "app" si nécessaire avant `fly launch` (ou utilisez --name).
app = "bouffay-shop"
primary_region = "cdg"

[build]
  dockerfile = "Dockerfile.fly"

[env]
  APP_ENV = "prod"
  APP_DEBUG = "0"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = false
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    soft_limit = 200
    hard_limit = 250

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
  cpus = 1
