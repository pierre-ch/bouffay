app = "bouffay-shop-mysql"
primary_region = "cdg"

[build]
  image = "mysql:8.0"

[[mounts]]
  source = "mysql_data"
  destination = "/var/lib/mysql"

[[services]]
  internal_port = 3306
  protocol = "tcp"
  auto_stop_machines = "off"
  auto_start_machines = false
  min_machines_running = 1

  [[services.ports]]
    port = 3306

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
