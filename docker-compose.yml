services:
  php:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: shop_php
    volumes:
      - .:/var/www/html
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini
    depends_on:
      - db
    environment:
      DATABASE_URL: mysql://user_devWeb:mdp_devWeb@db:3306/db_devWeb?serverVersion=8.0&charset=utf8
    networks:
      - shop_network

  nginx:
    image: nginx:alpine
    container_name: shop_nginx
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    networks:
      - shop_network

  db:
    image: mysql:8.0
    container_name: shop_db
    ports:
      - "8889:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: db_devWeb
      MYSQL_USER: user_devWeb
      MYSQL_PASSWORD: mdp_devWeb
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - shop_network

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: shop_phpmyadmin
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_USER: user_devWeb
      PMA_PASSWORD: mdp_devWeb
    depends_on:
      - db
    networks:
      - shop_network

volumes:
  db_data:

networks:
  shop_network:
    driver: bridge
