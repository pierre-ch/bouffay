databases:
  - name: bouffay-shop-db
    databaseName: bouffay_shop
    user: bouffay_shop
    plan: free
    region: frankfurt

services:
  - type: web
    name: bouffay-shop
    runtime: docker
    plan: free
    region: frankfurt
    dockerfilePath: ./Dockerfile.render
    healthCheckPath: /fr
    envVars:
      - key: APP_ENV
        value: prod
      - key: APP_DEBUG
        value: "0"
      - key: APP_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: bouffay-shop-db
          property: connectionString
      - key: PORT
        value: "10000"
